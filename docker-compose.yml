# ScanIt 生产环境 - docker-compose.yml
# 使用方法: docker-compose -f docker-compose.yml up -d

services:
  # ========== 后端 API ==========
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scanit-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID}
      - BING_API_KEY=${BING_API_KEY}
      - BAIDU_API_KEY=${BAIDU_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - scanit-network

  # ========== Celery Worker ==========
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scanit-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --queues=detection,report,alert,celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - scanit-network

  # ========== Celery Beat (定时任务) ==========
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scanit-celery-beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - scanit-network

  # ========== Flower (Celery 监控) ==========
  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scanit-flower
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_started
    networks:
      - scanit-network

  # ========== 前端 ==========
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scanit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - scanit-network

  # ========== Nginx 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: scanit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书挂载点
    depends_on:
      - frontend
      - backend
      - flower
    networks:
      - scanit-network

  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: scanit-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanit-network

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: scanit-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - scanit-network

networks:
  scanit-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

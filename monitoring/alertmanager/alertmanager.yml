# AlertManager 配置文件

global:
  # 邮件通知配置（需要配置 SMTP）
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@scanit.com'
  smtp_auth_username: ''
  smtp_auth_password: ''

# 路由配置
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    # 严重告警：立即通知
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 0s
    
    # 警告级别：延迟通知
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 30s

# 接收器配置
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@scanit.com'
        send_resolved: true

  - name: 'critical-receiver'
    email_configs:
      - to: 'admin@scanit.com,oncall@scanit.com'
        send_resolved: true
    slack_configs:
      - api_url: ''
        channel: '#alerts'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'admin@scanit.com'
        send_resolved: true

# 抑制规则（可选）
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

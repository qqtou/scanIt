# ScanIt 本机开发环境 - docker-compose.dev.yml
# 用法: docker-compose -f docker-compose.dev.yml up -d

services:
  # ========== 后端 API ==========
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: scanit-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-scanit_dev_password}@postgres:5432/${POSTGRES_DB:-scanit}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      - DEBUG=${DEBUG:-true}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      # 搜索引擎
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID:-}
      - BOCHA_API_KEY=${BOCHA_API_KEY:-}
      - BING_API_KEY=${BING_API_KEY:-}
      # LLM
      - AI_TIER=${AI_TIER:-local}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - DOUYIN_API_KEY=${DOUYIN_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - scanit-dev
    # 开发模式：挂载代码目录实现热重载
    volumes:
      - ../../backend/app:/app/app:ro

  # ========== Celery Worker ==========
  celery-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: scanit-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --queues=detection,report,alert,celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-scanit_dev_password}@postgres:5432/${POSTGRES_DB:-scanit}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AI_TIER=${AI_TIER:-local}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - scanit-dev

  # ========== Flower (Celery 监控) ==========
  flower:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: scanit-flower
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_started
    networks:
      - scanit-dev

  # ========== 前端 ==========
  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: scanit-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - scanit-dev

  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: scanit-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scanit_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-scanit}
    volumes:
      - scanit_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - scanit-dev

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: scanit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - scanit_redis_dev:/data
    networks:
      - scanit-dev

networks:
  scanit-dev:
    driver: bridge

volumes:
  scanit_postgres_dev:
  scanit_redis_dev:
